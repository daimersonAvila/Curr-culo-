services:
  - type: web
    name: curriculum-web
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/curriculum-web-1.0.0.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: curriculum-db
          property: connectionString
      - key: PORT
        value: 8080
      # ⚠️ CAMBIAR ESTAS CREDENCIALES EN RENDER → Environment
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: CambiarEsto2024!
      # Cookies seguras en producción (HTTPS)
      - key: SESSION_SECURE
        value: true

databases:
  - name: curriculum-db
    plan: free
    databaseName: curriculum_db
    user: curriculum_user
