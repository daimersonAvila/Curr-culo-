services:
  - type: web
    name: curriculum-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: curriculum-db
          property: connectionString
      - key: PORT
        value: 8080
      # ⚠️ CAMBIAR en Render → Environment → estos valores
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: CambiarEsto2024!
      - key: SESSION_SECURE
        value: true

databases:
  - name: curriculum-db
    plan: free
    databaseName: curriculum_db
    user: curriculum_user
