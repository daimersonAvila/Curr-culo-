# ============================================
# CONFIGURACION - RENDER READY + SECURITY
# ============================================

# Base de datos - usar variable de entorno DATABASE_URL en Render
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bd_curriculum}
spring.datasource.username=${DB_USERNAME:user_java}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Servidor
server.port=${PORT:8085}

# Seguridad: ocultar detalles de error al publico
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Admin credentials (cambiar en Render como variables de entorno)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:CambiarEsto2024!}

# Session timeout 30 minutos
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_SECURE:false}
server.servlet.session.cookie.same-site=strict
